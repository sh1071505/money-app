<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="가계부">
<meta name="theme-color" content="#0a0a1a">
<title>가계부</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%237c3aed'/><text x='50' y='62' text-anchor='middle' font-size='40' fill='white'>💰</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a1a;--surface:#111127;--surface2:#1a1a35;--surface3:#222245;
  --violet:#7c3aed;--violet-dim:#7c3aed40;--violet-glow:#7c3aed20;
  --rose:#f43f5e;--emerald:#34d399;--text:#e2e2f0;--text-dim:#666680;--text-muted:#444460;
  --border:#252545;
  --safe-top:env(safe-area-inset-top,20px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{
  height:100%;background:var(--bg);color:var(--text);
  font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;
  overflow:hidden;overscroll-behavior:none;
}
#app{height:100%;display:flex;flex-direction:column}
button{background:none;border:none;color:inherit;font:inherit;cursor:pointer;-webkit-user-select:none;user-select:none}
input{background:none;border:none;color:inherit;font:inherit;outline:none}
.scrollbar-hide::-webkit-scrollbar{display:none}
.scrollbar-hide{scrollbar-width:none}

/* Page transitions */
.page{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.page-enter{animation:slideIn .3s ease forwards}
.page-exit{animation:slideOut .3s ease forwards}
@keyframes slideIn{from{transform:translateX(100%);opacity:.8}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(100%);opacity:.8}}

/* Shared */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--safe-top) + 8px) 16px 8px}
.icon-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:12px}
.icon-btn:active{background:var(--surface2)}
.badge{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600}
.card{background:var(--surface);border-radius:16px;border:1px solid var(--border)}

/* Tab bar */
.tab-bar{display:flex;gap:4px;margin:0 16px 12px;background:var(--surface);border-radius:14px;padding:4px}
.tab-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 0;border-radius:10px;font-size:13px;font-weight:600;color:var(--text-dim);transition:.2s}
.tab-btn.active{background:var(--violet);color:#fff}
.tab-btn svg{width:16px;height:16px}

/* Calendar */
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 8px}
.cal-title{font-size:18px;font-weight:800}
.cal-summary{display:flex;justify-content:space-around;padding:12px 0;margin:0 8px 8px;background:var(--surface);border-radius:16px}
.cal-summary-item{text-align:center}
.cal-summary-label{font-size:11px;color:var(--text-dim)}
.cal-summary-val{font-size:15px;font-weight:700;margin-top:2px}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.cal-header span{text-align:center;font-size:11px;font-weight:500;color:var(--text-dim);padding:4px 0}
.cal-header span:first-child{color:var(--rose)}
.cal-header span:last-child{color:#60a5fa80}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-cell{display:flex;flex-direction:column;align-items:center;padding:6px 0;min-height:58px;border-radius:10px;transition:.15s}
.cal-cell:active:not(.other){background:var(--surface2)}
.cal-cell.today{background:var(--violet-glow);border:1px solid var(--violet-dim)}
.cal-cell.other{opacity:.2}
.cal-cell .day{font-size:13px;font-weight:500}
.cal-cell.sun .day{color:var(--rose)}
.cal-cell.sat .day{color:#60a5fa80}
.cal-cell.today .day{color:#a78bfa}
.cal-cell .amounts{margin-top:2px;display:flex;flex-direction:column;align-items:center}
.cal-cell .amt{font-size:8px;font-weight:600;line-height:1.3}
.amt.income{color:var(--emerald)}
.amt.expense{color:var(--rose)}

/* Bottom sheet */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.bottom-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:24px 24px 0 0;z-index:101;max-height:70vh;overflow:auto;animation:sheetUp .3s ease;padding-bottom:calc(var(--safe-bottom) + 16px)}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:40px;height:4px;background:var(--surface3);border-radius:99px;margin:12px auto 8px}
.sheet-title{font-size:17px;font-weight:700;padding:0 20px 4px}
.sheet-subtitle{display:flex;gap:16px;padding:0 20px 12px;font-size:13px}
.entry-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;margin:4px 16px;background:var(--surface2);border-radius:14px}
.entry-row:active{background:var(--surface3)}
.entry-info{display:flex;align-items:center;gap:10px}
.entry-cat{font-size:13px;font-weight:500}
.entry-memo{font-size:11px;color:var(--text-dim);margin-top:2px}
.entry-amount{font-size:14px;font-weight:700}
.add-row{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;margin:8px 16px;border:2px dashed var(--border);border-radius:14px;color:var(--text-dim);font-size:13px;font-weight:500}
.add-row:active{background:var(--surface2)}

/* Form */
.form-section{padding:0 16px;margin-bottom:16px}
.form-label{font-size:11px;color:var(--text-dim);font-weight:500;margin-bottom:6px}
.form-date{text-align:center;font-size:22px;font-weight:700;padding:8px 0}
.type-toggle{display:flex;background:var(--surface);border-radius:14px;padding:4px}
.type-btn{flex:1;padding:10px 0;border-radius:10px;font-size:14px;font-weight:600;text-align:center;transition:.2s}
.type-btn.active-expense{background:var(--rose);color:#fff}
.type-btn.active-income{background:var(--emerald);color:#fff}

/* Keypad */
.keypad-display{text-align:right;font-size:28px;font-weight:700;padding:8px;min-height:44px;font-variant-numeric:tabular-nums}
.keypad-display.empty{color:var(--text-muted)}
.keypad{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.key{height:46px;border-radius:12px;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;transition:.1s}
.key:active{transform:scale(.95)}
.key.num{background:var(--surface2);color:var(--text)}
.key.special{background:var(--violet-glow);color:#a78bfa}
.key.zero{background:var(--surface);color:#818cf4}
.key.del{background:#f43f5e15;color:var(--rose)}
.key.clear{background:var(--surface2);color:var(--text-dim)}
.keypad-done{width:100%;padding:14px;border-radius:12px;background:var(--violet);color:#fff;font-size:16px;font-weight:700;margin-top:8px}
.keypad-done:active{background:#6d28d9}

/* Categories */
.cat-wrap{display:flex;flex-wrap:wrap;gap:8px}
.cat-chip{padding:6px 14px;border-radius:99px;font-size:13px;font-weight:500;background:var(--surface2);color:var(--text-dim);transition:.15s}
.cat-chip:active{background:var(--surface3)}
.cat-chip.selected{background:var(--violet);color:#fff}
.cat-chip.add{border:1px dashed var(--violet-dim);color:#a78bfa}
.cat-input-row{display:flex;gap:8px;margin-top:8px}
.cat-input{flex:1;background:var(--surface2);border-radius:10px;padding:8px 14px;font-size:13px;border:1px solid var(--border)}
.cat-input:focus{border-color:var(--violet)}
.cat-input-btn{padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600}

/* Memo input */
.memo-input{width:100%;background:var(--surface);border-radius:14px;padding:12px 16px;font-size:14px;border:1px solid var(--border)}
.memo-input:focus{border-color:var(--violet-dim)}
.memo-input::placeholder{color:var(--text-muted)}

/* Recurring */
.recur-card{background:var(--surface);border-radius:14px;padding:16px}
.recur-header{display:flex;align-items:center;justify-content:space-between}
.recur-label{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500}
.toggle{width:48px;height:28px;border-radius:99px;position:relative;transition:.2s;background:var(--surface3)}
.toggle.on{background:var(--violet)}
.toggle-knob{width:22px;height:22px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:.2s}
.toggle.on .toggle-knob{left:23px}
.recur-options{display:flex;gap:8px;margin-top:12px}
.recur-opt{padding:6px 14px;border-radius:10px;font-size:12px;font-weight:500;background:var(--surface2);color:var(--text-dim);transition:.15s}
.recur-opt.active{background:var(--violet);color:#fff}

/* Save button */
.save-btn{width:100%;padding:16px;border-radius:14px;font-size:16px;font-weight:700;transition:.2s}
.save-btn.enabled{background:var(--violet);color:#fff}
.save-btn.enabled:active{background:#6d28d9}
.save-btn.disabled{background:var(--surface2);color:var(--text-muted)}

/* Summary */
.summary-chart{background:var(--surface);border-radius:16px;padding:16px;margin:0 16px 12px}
.summary-chart-title{font-size:13px;font-weight:600;color:var(--text-dim);margin-bottom:12px}
.chart-bars{display:flex;align-items:end;gap:4px;height:120px;padding:0 4px}
.chart-bar-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%}
.chart-bar-area{flex:1;display:flex;align-items:end;gap:2px;width:100%}
.chart-bar{border-radius:4px 4px 0 0;min-height:2px;flex:1}
.chart-bar.expense-bar{background:var(--rose)}
.chart-bar.income-bar{background:var(--emerald)}
.chart-label{font-size:9px;color:var(--text-dim);font-weight:500}
.go-today-btn{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#a78bfa;font-weight:500;padding:4px 12px;background:var(--violet-glow);border-radius:99px}
.go-today-btn:active{background:var(--violet-dim)}
.month-scroll{display:flex;gap:12px;overflow-x:auto;padding:0 16px 16px;scroll-snap-type:x mandatory}
.month-scroll::-webkit-scrollbar{display:none}
.month-card{flex-shrink:0;width:85vw;max-width:340px;scroll-snap-align:center;background:var(--surface);border-radius:16px;border:1px solid var(--border);overflow:hidden}
.month-card.current{border-color:var(--violet-dim)}
.month-card-header{padding:16px;width:100%}
.month-card-header:active{background:var(--surface2)}
.month-card-title{display:flex;align-items:center;justify-content:space-between}
.month-card-name{font-size:15px;font-weight:700}
.month-card-stats{display:flex;gap:20px;margin-top:8px}
.month-stat-label{font-size:11px;color:var(--text-dim)}
.month-stat-val{font-weight:700;margin-top:2px;font-size:14px}
.month-detail{padding:0 16px 16px;border-top:1px solid var(--border);padding-top:12px}
.month-detail-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--surface2);border-radius:10px;margin-bottom:4px}
.month-detail-cat{font-size:13px;color:var(--text-dim)}
.month-detail-vals{display:flex;gap:12px;font-size:12px;font-weight:500}

/* Settings */
.settings-item{display:flex;align-items:center;gap:10px;padding:14px 16px;margin:4px 16px;background:var(--surface);border-radius:14px}
.settings-item:active{background:var(--surface2)}
.settings-input{flex:1;background:var(--surface2);border-radius:10px;padding:8px 12px;font-size:14px;border:1px solid var(--border)}
.settings-input:focus{border-color:var(--violet)}
.settings-actions{display:flex;gap:4px}
.settings-icon-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:10px}
.settings-icon-btn:active{background:var(--surface3)}
.backup-section{margin:20px 16px;padding:16px;background:var(--surface);border-radius:16px;border:1px solid var(--border)}
.backup-title{font-size:14px;font-weight:700;margin-bottom:4px}
.backup-desc{font-size:12px;color:var(--text-dim);margin-bottom:12px}
.backup-btn{width:100%;padding:12px;border-radius:12px;font-size:14px;font-weight:600;margin-bottom:8px;text-align:center}
.backup-btn.export{background:var(--violet);color:#fff}
.backup-btn.export:active{background:#6d28d9}
.backup-btn.import{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.backup-btn.import:active{background:var(--surface3)}
.backup-msg{font-size:12px;padding:8px 12px;border-radius:10px;margin-top:8px;text-align:center}
.backup-msg.success{background:#34d39920;color:var(--emerald)}
.backup-msg.error{background:#f43f5e20;color:var(--rose)}

/* SVG icons inline */
.icon{display:inline-flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ─── State ───
const state = {
  view: 'calendar',      // calendar | summary | form | settings
  prevView: null,
  calYear: new Date().getFullYear(),
  calMonth: new Date().getMonth(),
  entries: [],
  categories: ['식비','교통','쇼핑','구독','주거','의료','급여','용돈','기타'],
  selectedDate: null,
  editingEntry: null,
  showDayDetail: false,
  formType: 'expense',
  formAmount: '',
  formCategory: '',
  formMemo: '',
  formTitle: '',
  formRecurring: false,
  formRecurCycle: 'monthly',
  showKeypad: true,
  showCatInput: false,
  newCatVal: '',
  expandedMonth: null,
  backupMsg: null,
};

// ─── SVG Icons ───
const icons = {
  chevronL: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>`,
  chevronR: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6 6"/></svg>`,
  chevronD: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>`,
  arrowL: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>`,
  settings: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`,
  calendar: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>`,
  chart: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>`,
  plus: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>`,
  trash: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>`,
  edit: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  check: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`,
  repeat: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>`,
  download: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>`,
  upload: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>`,
};

// ─── Helpers ───
const fmt = n => n === 0 ? '0' : n.toLocaleString('ko-KR');
const fmtShort = n => n >= 10000 ? Math.round(n/10000)+'만' : fmt(n);
const padMonth = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
const padDate = d => `${padMonth(d)}-${String(d.getDate()).padStart(2,'0')}`;
const parseDateStr = s => { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); };
const dayNames = ['일','월','화','수','목','금','토'];

function getRecurringEntries(entries, viewStart, viewEnd) {
  const result = [];
  entries.forEach(e => {
    if (!e.recurring) return;
    const startD = parseDateStr(e.date);
    const endD = parseDateStr(viewEnd);
    let current = new Date(startD);
    let safety = 0;
    while (current <= endD && safety < 500) {
      const ds = padDate(current);
      if (ds >= viewStart && ds <= viewEnd && ds !== e.date) {
        result.push({...e, date:ds, isRecurringGhost:true, originalId:e.id});
      }
      const next = parseDateStr(ds);
      if (e.recurCycle==='weekly') next.setDate(next.getDate()+7);
      else if (e.recurCycle==='biweekly') next.setDate(next.getDate()+14);
      else if (e.recurCycle==='monthly') next.setMonth(next.getMonth()+1);
      else if (e.recurCycle==='yearly') next.setFullYear(next.getFullYear()+1);
      current = next;
      safety++;
    }
  });
  return result;
}

function getAllEntries() {
  const vs = `${state.calYear-1}-01-01`;
  const ve = `${state.calYear+1}-12-31`;
  return [...state.entries, ...getRecurringEntries(state.entries, vs, ve)];
}

// ─── Storage ───
function saveAll() {
  try {
    localStorage.setItem('budget_entries', JSON.stringify(state.entries));
    localStorage.setItem('budget_categories', JSON.stringify(state.categories));
  } catch(e) { console.error(e); }
}
function loadAll() {
  try {
    const e = localStorage.getItem('budget_entries');
    const c = localStorage.getItem('budget_categories');
    if (e) state.entries = JSON.parse(e);
    if (c) state.categories = JSON.parse(c);
  } catch(e) { console.error(e); }
}

// ─── Render Engine ───
function render() {
  const app = document.getElementById('app');
  if (state.view === 'form') app.innerHTML = renderForm();
  else if (state.view === 'settings') app.innerHTML = renderSettings();
  else app.innerHTML = renderMain();
  bindEvents();
}

// ─── Main Page ───
function renderMain() {
  const dayDetailHTML = state.showDayDetail ? renderDayDetail() : '';
  return `
    <div class="top-bar">
      <div style="font-size:20px;font-weight:800;background:linear-gradient(135deg,#a78bfa,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent">가계부</div>
      <button class="icon-btn" data-action="settings">${icons.settings}</button>
    </div>
    <div class="tab-bar">
      <button class="tab-btn ${state.view==='calendar'?'active':''}" data-action="tab-calendar">${icons.calendar}<span>달력</span></button>
      <button class="tab-btn ${state.view==='summary'?'active':''}" data-action="tab-summary">${icons.chart}<span>요약</span></button>
    </div>
    <div style="flex:1;overflow:auto" class="scrollbar-hide">
      ${state.view==='calendar' ? renderCalendar() : renderSummary()}
    </div>
    ${dayDetailHTML}`;
}

// ─── Calendar ───
function renderCalendar() {
  const {calYear:y, calMonth:m} = state;
  const today = new Date();
  const firstDay = new Date(y,m,1).getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const prevDays = new Date(y,m,0).getDate();
  const monthKey = `${y}-${String(m+1).padStart(2,'0')}`;
  const all = getAllEntries();
  const monthEntries = all.filter(e => e.date.startsWith(monthKey));
  const totalExp = monthEntries.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
  const totalInc = monthEntries.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const net = totalInc - totalExp;

  const dateMap = {};
  monthEntries.forEach(e => {
    const d = e.date.split('-')[2];
    if (!dateMap[d]) dateMap[d] = {expense:0,income:0};
    dateMap[d][e.type] += e.amount;
  });

  const cells = [];
  for (let i=firstDay-1;i>=0;i--) cells.push({day:prevDays-i,other:true});
  for (let d=1;d<=daysInMonth;d++) {
    const dk = String(d).padStart(2,'0');
    cells.push({
      day:d,
      isToday: y===today.getFullYear()&&m===today.getMonth()&&d===today.getDate(),
      data: dateMap[dk],
      dateStr: `${monthKey}-${dk}`,
      dow: (firstDay + d - 1) % 7,
    });
  }
  const rem = 7 - (cells.length%7);
  if (rem<7) for(let i=1;i<=rem;i++) cells.push({day:i,other:true});

  let gridHTML = '';
  cells.forEach((c,i) => {
    const classes = ['cal-cell'];
    if (c.other) classes.push('other');
    if (c.isToday) classes.push('today');
    const dow = i % 7;
    if (dow===0) classes.push('sun');
    if (dow===6) classes.push('sat');

    let amtHTML = '';
    if (c.data) {
      amtHTML = '<div class="amounts">';
      if (c.data.income>0) amtHTML += `<span class="amt income">+${fmtShort(c.data.income)}</span>`;
      if (c.data.expense>0) amtHTML += `<span class="amt expense">-${fmtShort(c.data.expense)}</span>`;
      amtHTML += '</div>';
    }

    gridHTML += `<button class="${classes.join(' ')}" ${c.dateStr?`data-action="date" data-date="${c.dateStr}"`:'disabled'}>
      <span class="day">${c.day}</span>${amtHTML}</button>`;
  });

  return `
    <div style="padding:0 8px">
      <div class="cal-nav">
        <button class="icon-btn" data-action="prev-month">${icons.chevronL}</button>
        <span class="cal-title">${y}년 ${m+1}월</span>
        <button class="icon-btn" data-action="next-month">${icons.chevronR}</button>
      </div>
      <div class="cal-summary">
        <div class="cal-summary-item"><div class="cal-summary-label">수입</div><div class="cal-summary-val" style="color:var(--emerald)">₩${fmt(totalInc)}</div></div>
        <div class="cal-summary-item"><div class="cal-summary-label">지출</div><div class="cal-summary-val" style="color:var(--rose)">₩${fmt(totalExp)}</div></div>
        <div class="cal-summary-item"><div class="cal-summary-label">합계</div><div class="cal-summary-val" style="color:${net>=0?'var(--emerald)':'var(--rose)'}">₩${fmt(net)}</div></div>
      </div>
      <div class="cal-header">${['일','월','화','수','목','금','토'].map(d=>`<span>${d}</span>`).join('')}</div>
      <div class="cal-grid">${gridHTML}</div>
    </div>`;
}

// ─── Summary ───
function renderSummary() {
  const today = new Date();
  const all = getAllEntries();
  const months = [];
  for (let i=11;i>=0;i--) {
    const d = new Date(today.getFullYear(), today.getMonth()-i, 1);
    const key = padMonth(d);
    const me = all.filter(e=>e.date.startsWith(key));
    const expense = me.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
    const income = me.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
    const cats = {};
    me.forEach(e => {
      const c=e.category||'미분류';
      if(!cats[c])cats[c]={expense:0,income:0};
      cats[c][e.type]+=e.amount;
    });
    months.push({key, year:d.getFullYear(), month:d.getMonth()+1, expense, income, cats, isCurrent:i===0});
  }

  const maxVal = Math.max(...months.map(m=>Math.max(m.expense,m.income)),1);

  let chartBars = months.map(m => {
    const eh = Math.max(2, (m.expense/maxVal)*100);
    const ih = Math.max(2, (m.income/maxVal)*100);
    return `<div class="chart-bar-group">
      <div class="chart-bar-area"><div class="chart-bar expense-bar" style="height:${m.expense?eh:0}%"></div><div class="chart-bar income-bar" style="height:${m.income?ih:0}%"></div></div>
      <span class="chart-label">${m.month}월</span></div>`;
  }).join('');

  let monthCards = months.map(m => {
    const net = m.income - m.expense;
    let detailHTML = '';
    if (state.expandedMonth === m.key) {
      const catEntries = Object.entries(m.cats);
      detailHTML = `<div class="month-detail">${catEntries.length===0?'<div style="text-align:center;padding:8px;font-size:13px;color:var(--text-muted)">내역 없음</div>':
        catEntries.map(([c,v])=>`<div class="month-detail-row"><span class="month-detail-cat">${c}</span><div class="month-detail-vals">${v.expense>0?`<span style="color:var(--rose)">-₩${fmt(v.expense)}</span>`:''}${v.income>0?`<span style="color:var(--emerald)">+₩${fmt(v.income)}</span>`:''}</div></div>`).join('')}</div>`;
    }
    return `<div class="month-card ${m.isCurrent?'current':''}" ${m.isCurrent?'id="current-month"':''}>
      <button class="month-card-header" data-action="toggle-month" data-month="${m.key}">
        <div class="month-card-title"><span class="month-card-name">${m.year}년 ${m.month}월${m.isCurrent?' <span class="badge" style="background:var(--violet-glow);color:#a78bfa;margin-left:6px">현재</span>':''}</span><span style="color:var(--text-dim);transition:.2s;${state.expandedMonth===m.key?'transform:rotate(180deg)':''}">${icons.chevronD}</span></div>
        <div class="month-card-stats">
          <div><div class="month-stat-label">지출</div><div class="month-stat-val" style="color:var(--rose)">₩${fmt(m.expense)}</div></div>
          <div><div class="month-stat-label">수입</div><div class="month-stat-val" style="color:var(--emerald)">₩${fmt(m.income)}</div></div>
          <div><div class="month-stat-label">합계</div><div class="month-stat-val" style="color:${net>=0?'var(--emerald)':'var(--rose)'}">₩${fmt(net)}</div></div>
        </div>
      </button>${detailHTML}</div>`;
  }).join('');

  return `
    <div class="summary-chart">
      <div class="summary-chart-title">월별 추이</div>
      <div class="chart-bars">${chartBars}</div>
    </div>
    <div style="display:flex;justify-content:flex-end;padding:0 16px 8px">
      <button class="go-today-btn" data-action="go-today">이번 달로 이동 →</button>
    </div>
    <div class="month-scroll" id="month-scroll">${monthCards}</div>`;
}

// ─── Event Binding ───
function bindEvents() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', handleAction);
  });
  // Memo input sync
  const memoInput = document.getElementById('memo-input');
  if (memoInput) memoInput.addEventListener('input', e => { state.formMemo = e.target.value; });
  // Title input sync
  const titleInput = document.getElementById('title-input');
  if (titleInput) titleInput.addEventListener('input', e => { state.formTitle = e.target.value; });
  // New cat input sync
  const newCatInput = document.getElementById('new-cat-input');
  if (newCatInput) {
    newCatInput.addEventListener('input', e => { state.newCatVal = e.target.value; });
    newCatInput.addEventListener('keydown', e => { if(e.key==='Enter') handleAction({currentTarget:{dataset:{action:'add-cat'}}}); });
    setTimeout(()=>newCatInput.focus(),50);
  }
  // Settings cat input
  const settingsCatInput = document.getElementById('new-settings-cat');
  if (settingsCatInput) {
    settingsCatInput.addEventListener('keydown', e => {
      if(e.key==='Enter') handleAction({currentTarget:{dataset:{action:'add-settings-cat'}}});
    });
  }
  // Import file
  const importFile = document.getElementById('import-file');
  if (importFile) {
    importFile.addEventListener('change', handleImport);
  }
}

function handleAction(e) {
  const el = e.currentTarget || e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;

  switch(action) {
    case 'tab-calendar': state.view='calendar'; state.showDayDetail=false; break;
    case 'tab-summary': state.view='summary'; break;
    case 'settings': state.view='settings'; state.backupMsg=null; break;
    case 'back':
      state.view='calendar'; state.editingEntry=null; state.showDayDetail=false;
      state.showCatInput=false; state.newCatVal=''; state.backupMsg=null; state.formTitle='';
      break;
    case 'prev-month':
      if(state.calMonth===0){state.calMonth=11;state.calYear--}else state.calMonth--;
      break;
    case 'next-month':
      if(state.calMonth===11){state.calMonth=0;state.calYear++}else state.calMonth++;
      break;
    case 'date': {
      const ds = el.dataset.date;
      state.selectedDate = ds;
      const dayEntries = getAllEntries().filter(e=>e.date===ds);
      if (dayEntries.length===0) {
        openForm(ds, null);
      } else {
        state.showDayDetail = true;
      }
      break;
    }
    case 'close-detail': state.showDayDetail=false; break;
    case 'add-entry': state.showDayDetail=false; openForm(state.selectedDate, null); break;
    case 'edit-entry': {
      const id = el.dataset.id;
      const entry = state.entries.find(e=>e.id===id);
      if(entry) { state.showDayDetail=false; openForm(entry.date, entry); }
      break;
    }
    // Form actions
    case 'set-type': state.formType=el.dataset.type; break;
    case 'key': {
      const k = el.dataset.key;
      if(k==='⌫') state.formAmount=state.formAmount.slice(0,-1);
      else if(k==='C') state.formAmount='';
      else if(k==='+1000') state.formAmount=String(Number(state.formAmount||'0')+1000);
      else if(k==='+10000') state.formAmount=String(Number(state.formAmount||'0')+10000);
      else state.formAmount=(state.formAmount||'')+k;
      break;
    }
    case 'keypad-done': state.showKeypad=false; break;
    case 'show-keypad': state.showKeypad=true; break;
    case 'select-cat': state.formCategory=el.dataset.cat; break;
    case 'show-cat-input': state.showCatInput=true; break;
    case 'hide-cat-input': state.showCatInput=false; state.newCatVal=''; break;
    case 'add-cat': {
      const v = state.newCatVal.trim();
      if(v && !state.categories.includes(v)) {
        state.categories.push(v);
        saveAll();
      }
      if(v) state.formCategory=v;
      state.showCatInput=false; state.newCatVal='';
      break;
    }
    case 'toggle-recur': state.formRecurring=!state.formRecurring; break;
    case 'set-cycle': state.formRecurCycle=el.dataset.cycle; break;
    case 'save': {
      const entry = {
        id: state.editingEntry?.id || Date.now().toString(),
        date: state.selectedDate,
        type: state.formType,
        title: state.formTitle,
        amount: Number(state.formAmount),
        category: state.formCategory,
        memo: state.formMemo,
        recurring: state.formRecurring,
        recurCycle: state.formRecurring ? state.formRecurCycle : null,
      };
      if(state.editingEntry) {
        const idx = state.entries.findIndex(e=>e.id===entry.id);
        if(idx>=0) state.entries[idx]=entry;
      } else {
        state.entries.push(entry);
      }
      saveAll();
      state.view='calendar'; state.editingEntry=null; state.showDayDetail=false;
      break;
    }
    case 'delete-entry': {
      const id = state.editingEntry?.id || el.dataset.id;
      state.entries = state.entries.filter(e=>e.id!==id);
      saveAll();
      state.view='calendar'; state.editingEntry=null; state.showDayDetail=false;
      break;
    }
    // Summary
    case 'toggle-month':
      state.expandedMonth = state.expandedMonth===el.dataset.month ? null : el.dataset.month;
      break;
    case 'go-today':
      render();
      setTimeout(()=>{
        const el = document.getElementById('current-month');
        if(el) el.scrollIntoView({behavior:'smooth',inline:'center'});
      },50);
      return;
    // Settings
    case 'edit-cat': {
      const idx = Number(el.dataset.idx);
      const newVal = prompt('분류 이름 수정', state.categories[idx]);
      if(newVal && newVal.trim()) { state.categories[idx]=newVal.trim(); saveAll(); }
      break;
    }
    case 'delete-cat': {
      const idx = Number(el.dataset.idx);
      if(confirm(`'${state.categories[idx]}' 분류를 삭제할까요?`)) {
        state.categories.splice(idx,1);
        saveAll();
      }
      break;
    }
    case 'add-settings-cat': {
      const input = document.getElementById('new-settings-cat');
      const v = input?.value.trim();
      if(v && !state.categories.includes(v)) { state.categories.push(v); saveAll(); }
      break;
    }
    case 'export-data': exportData(); return;
    case 'import-data': document.getElementById('import-file')?.click(); return;
  }
  render();
}

function openForm(dateStr, entry) {
  state.view = 'form';
  state.selectedDate = dateStr;
  state.editingEntry = entry;
  state.formType = entry?.type || 'expense';
  state.formAmount = entry ? String(entry.amount) : '';
  state.formCategory = entry?.category || '';
  state.formMemo = entry?.memo || '';
  state.formTitle = entry?.title || '';
  state.formRecurring = entry?.recurring || false;
  state.formRecurCycle = entry?.recurCycle || 'monthly';
  state.showKeypad = !entry;
  state.showCatInput = false;
  state.newCatVal = '';
}

// ─── Backup / Restore ───
function exportData() {
  const data = {
    version: 1,
    exportDate: new Date().toISOString(),
    entries: state.entries,
    categories: state.categories,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `가계부_백업_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  state.backupMsg = {type:'success', text:'백업 파일이 다운로드되었습니다!'};
  render();
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.entries || !data.categories) throw new Error('Invalid format');
      const merge = confirm('기존 데이터에 합칠까요?\n\n[확인] = 기존 + 백업 합치기\n[취소] = 백업으로 완전 교체');
      if (merge) {
        const existingIds = new Set(state.entries.map(e=>e.id));
        data.entries.forEach(e => { if(!existingIds.has(e.id)) state.entries.push(e); });
        data.categories.forEach(c => { if(!state.categories.includes(c)) state.categories.push(c); });
      } else {
        state.entries = data.entries;
        state.categories = data.categories;
      }
      saveAll();
      state.backupMsg = {type:'success', text:`복원 완료! (${data.entries.length}건)`};
    } catch(err) {
      state.backupMsg = {type:'error', text:'파일 형식이 올바르지 않습니다.'};
    }
    render();
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ─── Init ───
loadAll();
render();

// Register SW
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
